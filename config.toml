# ZeroClaw configuration — managed by NixOS, do not edit manually
# Secret placeholders (replaced at activation time):
#   @BRAVE_API_KEY@ → zeroclaw/brave-api-key sops secret
default_provider = "zai-coding"
default_model = "glm-5"
default_temperature = 0.7

[model_providers.zai]
base_url = "http://127.0.0.1:5100/api/paas/v4"
wire_api = "chat_completions"

[model_providers.zai-coding]
base_url = "http://127.0.0.1:5100/api/coding/paas/v4"
wire_api = "chat_completions"

[identity]
format = "openclaw"

[gateway]
port = 42617
host = "127.0.0.1"
require_pairing = false

[browser]
enabled = true
backend = "rust_native"
native_headless = true
native_webdriver_url = "http://127.0.0.1:9515"
native_chrome_path = "/run/current-system/sw/bin/google-chrome-stable"
allowed_domains = ["*"]

[web_search]
enabled = true
provider = "brave"
brave_api_key = "@BRAVE_API_KEY@"

[channels_config]
cli = true

[autonomy]
level = "full"
workspace_only = false
max_actions_per_hour = 9999
max_cost_per_day_cents = 500
require_approval_for_medium_risk = false
block_high_risk_commands = false
allowed_roots = ["/etc/nixos/", "~/Projects/", "~/.zeroclaw/documents/"]
allowed_commands = [
  "git", "nix", "nixos-rebuild", "systemctl", "journalctl",
  "zeroclaw", "gpush", "gcommit", "gh", "cargo",
  "node", "bun", "npm", "python3", "bash", "sh",
  "ls", "cat", "grep", "find", "cp", "mv", "rm",
  "mkdir", "chmod", "chown", "curl", "wget", "jq",
  "direnv", "sudo", "gog", "himalaya", "skills-sync", "cron-sync",
  "kapso-whatsapp-cli"
]
forbidden_paths = [
  "/root", "/usr", "/bin", "/sbin", "/lib", "/opt",
  "/boot", "/dev", "/proc", "/sys", "/var", "/tmp",
  "~/.ssh", "~/.gnupg", "~/.aws"
]
non_cli_excluded_tools = [
  "memory_forget",
  "proxy_config",
  "pushover",
  "composio"
]

[research]
enabled = true
trigger = "keywords"
keywords = ["find", "search", "check", "investigate", "show", "list"]
max_iterations = 5

[memory]
backend = "sqlite"
auto_save = true

[observability]
backend = "none"
runtime_trace_mode = "rolling"
runtime_trace_max_entries = 200

[agent]
max_tool_iterations = 40
max_history_messages = 100

[agents_ipc]
enabled = true
db_path = "~/.zeroclaw/agents.db"
staleness_secs = 300
