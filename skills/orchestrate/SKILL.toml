[skill]
name = "orchestrate"
description = "Escalate complex tasks to Opus. Launch orchestrated multi-tool workflows, check status, manage running tasks."
version = "0.2.0"
tags = ["orchestration", "tasks", "automation", "opus"]

[[tools]]
name = "orchestrate_cli"
description = "Opus orchestration CLI. Subcommands: run <goal-or-yaml>, status [id], list, cancel <id>, checkpoint <id> <note>, complete <id>, fail <id> <error>"
kind = "shell"
command = "bun run /etc/nixos/zeroclaw/skills/orchestrate/cli.ts {args}"

[tools.args]
args = "Subcommand and arguments"
