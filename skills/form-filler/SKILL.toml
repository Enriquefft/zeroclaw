[skill]
name = "form-filler"
description = "Fill opportunity forms (jobs, scholarships, grants, fellowships) with research-backed, strategically crafted, human-sounding answers. Researches the org, analyzes past winners, builds per-question strategy, drafts with aggressive framing, humanizes, then runs adversarial review. Never submits."
version = "0.2.0"
tags = ["browser", "forms", "applications", "opportunities"]

[[tools]]
name = "form_filler"
description = "Opportunity form management CLI. Subcommands: init <url> [--type T] [--deadline D], list, show <slug>, status <slug> <s>, questions <slug> add|batch|list|triage, answers <slug> set|list, report <slug>, evolve <slug>, cdp-extract <slug> <url>, login <url>, cookies cdp|bridge|clear"
kind = "shell"
command = "bun run /etc/nixos/zeroclaw/skills/form-filler/cli.ts {args}"

[tools.args]
args = "Subcommand and arguments (e.g. 'init https://example.com --type scholarship', 'questions my-slug add --label \"Why us?\" --type textarea --required --max-length 500')"
