[skill]
name = "email"
description = "Full email control across all accounts (Gmail, SpaceMail). Read, search, send, reply, forward, thread, label, mark, archive, trash, delete, attachments, and account management."
version = "0.1.0"
tags = ["email", "gmail", "spacemail"]

[[tools]]
name = "email_cli"
description = "Email management CLI. Subcommands: list, search, get, send, reply, forward, thread, labels, label, mark, archive, trash, delete, attachments, accounts"
kind = "shell"
command = "bun run /etc/nixos/zeroclaw/skills/email/cli.ts {args}"

[tools.args]
args = "Subcommand and arguments (e.g. 'inbox', 'read 123', 'send user@example.com --subject Hi --body Hello')"
