[skill]
name = "repair-loop"
description = "File a durable issue record and begin repair. Invoke repair_loop before attempting any fix — it enforces the filing step atomically. Usage: repair_loop <issue_description>"
version = "0.1.0"
author = "kiro"
tags = ["resilience", "repair", "memory"]

[[tools]]
name = "repair_loop"
description = "File issue to ZeroClaw memory and signal repair start. Pass a description of the issue. Returns structured output with REPAIR_LOOP_KEY (the memory key) for follow-up resolution calls. After invoking, call memory_store with the returned key to mark resolved when done."
kind = "shell"
command = "/etc/nixos/zeroclaw/bin/repair-loop.sh"
