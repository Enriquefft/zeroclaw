name: "Build-in-Public Drafter"
schedule: "0 9 * * *"
tz: "America/Lima"
type: agent
goal: "Draft build-in-public posts for X and LinkedIn from recent activity, send for Enrique's approval via WhatsApp"
hints:
  - "Data sources: git log (last 2 days) from ~/Projects/post-shit-now and /etc/nixos/zeroclaw. state.db job_applications with recent status changes. content_log for recently covered topics (avoid repetition)"
  - "Check paper repos (github.com/Enriquefft/Alerta-Escuela-Equity-Audit, ENSO AIR) for recent commits. Turn research progress into accessible content"
  - "Gate: if no meaningful commits or milestones, stop silently -- don't force content"
  - "Voice: load PSN voice context via psn_cli content build-context --platform <platform>. Also read SOUL.md for kill list and voice rules. Write the content yourself -- do NOT delegate content writing to fast_run or PSN"
  - "Platforms: draft X version (short, punchy, max 280 chars) and LinkedIn version (400-800 chars, polished but human). Each gets its own psn_cli post create call"
  - "Approval: send both drafts to +51926689401 with postIds. Format: DRAFT FOR X [postId]: <content>. Ask for APPROVE/EDIT/KILL per post"
  - "Delegation: data gathering (git log, state.db queries, PSN CLI data fetches) can go to fast_run. Content writing and quality evaluation stay with you"
notify: "+51926689401"
