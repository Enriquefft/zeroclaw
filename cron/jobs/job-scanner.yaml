name: "Job Scanner"
schedule: "0 9,15 * * *"
tz: "America/Lima"
type: agent
goal: "Search job boards for new leads matching LORE.md criteria, score them, deduplicate via state.db, and send a WhatsApp digest for qualifying leads"
hints:
  - "Read LORE.md for target roles, paths, salary thresholds, and scoring rubric"
  - "Check Wellfound, RemoteOK, WeWorkRemotely, HN Who Is Hiring (1st of month), YC Work at a Startup"
  - "Deduplicate against state.db job_applications by URL"
  - "Score 0-100 per LORE.md rubric: role fit 50, remote 20, salary 20, path alignment 10"
  - "Only notify for leads scoring 70+. Flag 90+ for cold outreach per LORE.md application approach"
  - "For leads scoring 90+, draft a cold DM to the hiring manager or CTO using SOUL.md voice and LORE.md positioning. Reference something specific about the company. Send draft to Enrique via WhatsApp for approval before any external contact"
  - "Insert new leads into state.db job_applications table"
notify: "+51926689401"
