name: "Content Scout"
schedule: "0 8 * * *"
tz: "America/Lima"
type: agent
goal: "Fetch RSS feeds and trending web content, filter against content pillars, and deliver a categorized digest via WhatsApp"
hints:
  - "RSS feeds: HN, arXiv cs.AI/cs.LG/cs.CL, Simon Willison, Pragmatic Engineer, Latent Space, Rundown AI"
  - "Web search trending: AI agents, build-in-public developer, LLM engineering trends"
  - "Filter against 5 content pillars: build-in-public, AI/agent engineering, job hunt, startup/founder, research"
  - "Output SILENT if nothing relevant after filtering"
  - "Compact WhatsApp digest under 1500 chars, pillar headers with 2-3 bullet links"
  - "Capture relevant items into PSN idea bank via psn_cli if available"
