name: "Follow-up Enforcer"
schedule: "0 10,14,17 * * *"
tz: "America/Lima"
type: agent
goal: "Detect stale commitments and send urgency-tiered nudge to Enrique if anything is overdue"
hints:
  - "Determine urgency tier by current hour in America/Lima: 10=gentle (5+ days), 14=warning (3+ days), 17=urgent (any age)"
  - "Check state.db job_applications with status='applied' older than threshold"
  - "Check email threads sent by Enrique with no inbound reply in last 3 days via email_cli"
  - "Check orchestration_tasks for failed parent tasks"
  - "Output SILENT if nothing stale. Otherwise send WhatsApp nudge with staleness + tier label"
