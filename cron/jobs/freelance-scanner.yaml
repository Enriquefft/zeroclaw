name: "Freelance Scanner"
schedule: "0 9,15 * * *"
tz: "America/Lima"
type: agent
goal: "Search freelance gig platforms for new leads matching LORE.md criteria, score them, deduplicate via state.db, and send a WhatsApp digest for qualifying leads"
steps:
  - Read /etc/nixos/zeroclaw/documents/LORE.md and extract target paths, skills, freelance platforms to monitor (Toptal, Upwork, Contra, and any others listed), and positioning or rate hints. Output a compact JSON summary of search criteria with fields: skills (array), platforms (array of platform names), rate_min (number or null), remote_only (boolean).
  - Search the web for freelance gig listings matching the criteria from the previous step. Query the extracted platforms -- Toptal, Upwork, Contra, and others from LORE.md. For each result collect title, company or client name, url, budget or rate if visible, and remote status. Output a list of objects where each object has fields title, company, url, budget (string or null), remote (boolean), source_platform.
  - Query state.db at ~/.zeroclaw/workspace/state.db to get known freelance URLs. Run: sqlite3 ~/.zeroclaw/workspace/state.db 'SELECT url FROM freelance_leads'. Discard any discovered leads whose URL is already in that list. For the remaining new leads, score each one 0 to 100 against the LORE.md scoring rubric -- skill fit up to 50 points, rate or budget match up to 25 points, remote status up to 15 points, platform or client quality up to 10 points. Output the list of new leads with scores, each as an object with title, company, url, budget, score, source_platform.
  - Insert all new leads into state.db freelance_leads table. For each lead run sqlite3 ~/.zeroclaw/workspace/state.db with an INSERT OR IGNORE INTO freelance_leads (title, company, url, status, found_date, match_score, source_platform, last_updated) VALUES using the values from the previous step (status is 'new', found_date and last_updated are unixepoch()). After inserting, check if any leads scored 70 or above. If yes, compose a WhatsApp digest listing each qualifying lead as one line with title, company, score, and url -- leads scoring 90 or above get an extra note appended recommending cold outreach to the client or platform contact per LORE.md application approach. Send the digest to +51926689401 via: kapso-whatsapp-cli send --to +51926689401 --text followed by the message text. If no leads scored 70 or above, exit silently without sending.
notify: "+51926689401"
